<!DOCTYPE html>
<html>
<head>
    <title>LiFi Receiver - Node B</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .terminal { background: #000; border: 2px solid #333; height: 300px; overflow-y: scroll; padding: 15px; text-align: left; }
        .meta { color: #0088ff; font-size: 0.8em; }
        button { background: #333; color: white; border: 1px solid #555; padding: 10px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>LiFi Receiver Monitor (Node B)</h2>
    <button id="connect">Connect to Receiver ESP32</button>
    <div class="terminal" id="output">--- Awaiting Data Stream ---</div>

    <script>
        const output = document.getElementById('output');
        const btnConnect = document.getElementById('connect');

        btnConnect.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                btnConnect.innerText = "Connected";
                const decoder = new TextDecoderStream();
                const inputFinished = port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) {
                        const newSpan = document.createElement('span');
                        newSpan.innerText = value;
                        output.appendChild(newSpan);
                        output.scrollTop = output.scrollHeight;
                    }
                }
            } catch (e) { alert("Serial Error: " + e); }
        });
    </script>
</body>
</html>
